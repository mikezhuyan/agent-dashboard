<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Agent Dashboard</title>
    <link rel="stylesheet" href="css/style.css?v=2.1">
</head>
<body>
    <div class="bg-animation"></div>
    <div class="grid-pattern"></div>
    
    <!-- Floating particles -->
    <div id="particles"></div>

    <div class="container">
        <header>
            <div class="header-top">
                <div class="view-switcher">
                    <button class="view-btn active" onclick="switchView('grid')" title="卡片视图">
                        <span>⊞</span>
                    </button>
                    <button class="view-btn" onclick="switchView('grid-horizontal')" title="横向卡片">
                        <span>⊟</span>
                    </button>
                    <button class="view-btn" onclick="switchView('list')" title="列表视图">
                        <span>☰</span>
                    </button>
                </div>
                <div class="header-actions">
                    <button class="settings-btn create-agent-btn" onclick="openCreateAgentModal()">
                        <span>➕</span>
                        <span>新建 Agent</span>
                    </button>
                    <button class="settings-btn" onclick="openSettings()">
                        <span>⚙️</span>
                        <span>设置</span>
                    </button>
                </div>
            </div>
            <div class="logo">
                <div class="logo-icon">🤖</div>
                <h1 id="dashboardTitle">Agent Dashboard</h1>
            </div>
            <p class="subtitle" id="dashboardSubtitle">实时监控 Agent 状态与 Token 使用情况</p>
            <div id="currentDate" class="current-date"></div>
        </header>

        <div class="stats-overview" id="statsOverview">
            <div class="loading">
                <div class="loading-spinner"></div>
                <p>加载中...</p>
            </div>
        </div>

        <div class="sort-hint" id="sortHint">
            <span>💡 提示：拖动卡片可以调整排序</span>
        </div>
        <div class="agent-grid" id="agentGrid">
            <!-- Agent cards will be inserted here -->
        </div>
    </div>

    <!-- Session Details Modal -->
    <div class="modal-overlay" id="modalOverlay">
        <div class="modal">
            <div class="modal-header">
                <h3 class="modal-title">会话详情</h3>
                <button class="modal-close" onclick="closeModal()">✕</button>
            </div>
            <div class="modal-body" id="modalBody">
                <!-- Modal content -->
            </div>
        </div>
    </div>

    <!-- Create Agent Modal -->
    <div class="modal-overlay" id="createAgentModal">
        <div class="modal">
            <div class="modal-header">
                <h3 class="modal-title">➕ 创建新 Agent</h3>
                <button class="modal-close" onclick="closeCreateAgentModal()">✕</button>
            </div>
            <div class="modal-body">
                <div class="settings-form">
                    <div class="form-row">
                        <div class="form-group">
                            <label>Agent ID <span class="required">*</span></label>
                            <input type="text" id="newAgentId" placeholder="如: my-assistant" 
                                   pattern="[a-z0-9_-]+" title="只允许小写字母、数字、连字符和下划线">
                            <small class="form-hint">唯一标识，创建后不可修改</small>
                        </div>
                        <div class="form-group">
                            <label>显示名称 <span class="required">*</span></label>
                            <input type="text" id="newAgentName" placeholder="如: 我的小助手">
                        </div>
                    </div>
                    
                    <div class="form-row">
                        <div class="form-group">
                            <label>角色</label>
                            <input type="text" id="newAgentRole" placeholder="如: 代码助手">
                        </div>
                        <div class="form-group">
                            <label>Emoji 图标</label>
                            <input type="text" id="newAgentEmoji" placeholder="🤖" maxlength="2">
                        </div>
                    </div>
                    
                    <div class="form-row">
                        <div class="form-group">
                            <label>颜色主题</label>
                            <select id="newAgentColor">
                                <option value="cyan">青色 (Cyan)</option>
                                <option value="main">蓝紫 (Main)</option>
                                <option value="coder">青蓝 (Coder)</option>
                                <option value="brainstorm">橙粉 (Brainstorm)</option>
                                <option value="writer">绿青 (Writer)</option>
                                <option value="investor">绿橙 (Investor)</option>
                            </select>
                        </div>
                        <div class="form-group">
                            <label>模型提供商</label>
                            <select id="newAgentProvider" onchange="onProviderChange()">
                                <option value="">加载中...</option>
                            </select>
                        </div>
                    </div>
                    
                    <div class="form-group">
                        <label>选择模型</label>
                        <select id="newAgentModel">
                            <option value="">请先选择提供商</option>
                        </select>
                    </div>
                    
                    <div class="form-group">
                        <label>描述</label>
                        <input type="text" id="newAgentDescription" placeholder="描述这个 Agent 的用途...">
                    </div>
                    
                    <div class="form-group">
                        <label>系统提示词 (System Prompt)</label>
                        <textarea id="newAgentSystemPrompt" rows="3" 
                                  placeholder="设置 Agent 的系统角色和行为..."></textarea>
                    </div>
                    
                    <div class="form-actions">
                        <button class="btn btn-secondary" onclick="closeCreateAgentModal()">取消</button>
                        <button class="btn btn-primary" onclick="createAgent()">创建 Agent</button>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <!-- Settings Modal -->
    <div class="modal-overlay" id="settingsModal">
        <div class="modal">
            <div class="modal-header">
                <h3 class="modal-title">⚙️ Dashboard 设置</h3>
                <button class="modal-close" onclick="closeSettings()">✕</button>
            </div>
            <div class="modal-body">
                <div class="settings-form">
                    <div class="form-group">
                        <label>Dashboard 名称</label>
                        <input type="text" id="settingDashboardName" placeholder="Agent Dashboard">
                    </div>
                    
                    <div class="form-group">
                        <label>副标题</label>
                        <input type="text" id="settingSubtitle" placeholder="实时监控 Agent 状态">
                    </div>
                    
                    <div class="form-row">
                        <div class="form-group">
                            <label>自动刷新间隔 (秒)</label>
                            <input type="number" id="settingRefreshInterval" min="5" max="300" value="30">
                        </div>
                        <div class="form-group">
                            <label class="checkbox-label">
                                <input type="checkbox" id="settingShowCost" checked>
                                <span>显示费用估算</span>
                            </label>
                        </div>
                    </div>
                    
                    <div class="section-title" style="margin-top: 20px;">Token 成本配置 (元/百万tokens)</div>
                    
                    <div class="form-row">
                        <div class="form-group">
                            <label>输入 Token 价格</label>
                            <input type="number" id="settingInputPrice" step="0.1" min="0" value="2">
                        </div>
                        <div class="form-group">
                            <label>输出 Token 价格</label>
                            <input type="number" id="settingOutputPrice" step="0.1" min="0" value="8">
                        </div>
                        <div class="form-group">
                            <label>缓存 Token 价格</label>
                            <input type="number" id="settingCachePrice" step="0.1" min="0" value="1">
                        </div>
                    </div>
                    
                    <div class="form-actions">
                        <button class="btn btn-secondary" onclick="closeSettings()">取消</button>
                        <button class="btn btn-primary" onclick="saveSettings()">保存设置</button>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <!-- Avatar Upload Modal -->
    <div class="modal-overlay" id="avatarModal">
        <div class="modal">
            <div class="modal-header">
                <h3 class="modal-title">📷 更换头像</h3>
                <button class="modal-close" onclick="closeAvatarUpload()">✕</button>
            </div>
            <div class="modal-body">
                <img id="avatarPreview" class="avatar-preview" style="display: none;" alt="Preview">
                
                <div class="upload-zone" 
                     onclick="document.getElementById('avatarFileInput').click()"
                     ondragover="handleDragOver(event)"
                     ondragleave="handleDragLeave(event)"
                     ondrop="handleDrop(event)">
                    <div class="upload-zone-icon">📁</div>
                    <div class="upload-zone-text">点击或拖拽图片到此处</div>
                    <div class="upload-zone-hint">支持 PNG, JPG, GIF, WebP 格式，最大 5MB</div>
                </div>
                
                <input type="file" id="avatarFileInput" class="file-input" 
                       accept="image/png,image/jpeg,image/gif,image/webp"
                       onchange="handleAvatarSelect(event)">
                
                <div class="form-actions">
                    <button class="btn btn-secondary" onclick="closeAvatarUpload()">取消</button>
                    <button class="btn btn-primary" onclick="uploadAvatar()">上传头像</button>
                </div>
            </div>
        </div>
    </div>

    <script src="js/app.js?v=2.1"></script>
</body>
</html>
